# -- General --
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
set -g set-clipboard on

# -- Prefix --
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# -- Splits (use current path) --
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# -- New window keeps current path --
bind c new-window -c "#{pane_current_path}"

# -- Pane navigation --
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# -- Pane resizing --
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# -- Window navigation (prefix-less, for BTT gestures) --
bind -n M-Left  previous-window
bind -n M-Right next-window

# -- Jump to last (highest-indexed) window with prefix + 0 --
bind 0 select-window -t :$

# -- Search (prefix + / from Kitty's Cmd+F) --
bind / copy-mode \; send-keys /

# -- Reload config --
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# -- Nested tmux: F12 (sent by Kitty Cmd+.) toggles outer prefix on/off --
bind -T root F12 \
  set prefix None \;\
  set key-table off \;\
  set status-style "bg=colour238,fg=colour245" \;\
  refresh-client -S

bind -T off F12 \
  set -u prefix \;\
  set -u key-table \;\
  set -u status-style \;\
  refresh-client -S

# -- Plugins --
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'dracula/tmux'

# -- Plugin settings --
set -g @continuum-restore 'on'
set -g @resurrect-processes 'vi vim nvim emacs man less more tail top htop irssi mutt ssh watch'

# -- Dracula theme --
set -g @dracula-show-powerline true
set -g @dracula-plugins "git time"
set -g @dracula-show-left-icon session

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
